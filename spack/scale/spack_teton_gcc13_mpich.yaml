      paths:
        cc: /apps/spack/opt/gcc-11.5.0/gcc-13.4.0-5dyuqxsmafc7dhogrdbdiqqifmhupqwr/bin/gcc
        cxx: /apps/spack/opt/gcc-11.5.0/gcc-13.4.0-5dyuqxsmafc7dhogrdbdiqqifmhupqwr/bin/g++
        fc: /apps/spack/opt/gcc-11.5.0/gcc-13.4.0-5dyuqxsmafc7dhogrdbdiqqifmhupqwr/bin/gfortran
