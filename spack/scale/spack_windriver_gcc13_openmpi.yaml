# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings for SCALE 7.0.beta10 2026/06/10
#
# Assumes: module load gcc/13.3.0-gcc-10.5.0-bync
#          module load openmpi/5.0.5-gcc-13.3.0-lx62
spack:
  specs:
  - cmake@3.23
  - netlib-lapack@3.11.0 %gcc@=13.3.0
  - boost@1.74.0 %gcc@13.3.0
  - swig@4.0.2 %gcc@13.3.0
  - hdf5@1.12.2 +cxx+fortran+hl ^openmpi@5.0.5 %gcc@=13.3.0
  - petsc@3.15.5 +metis+superlu-dist+hypre ^openmpi@5.0.5 %gcc@=13.3.0
  - silo@4.11.1 +hdf5 ^hdf5@1.12.2 +cxx+fortran+hl ^openmpi@5.0.5 %gcc@=13.3.0
  - trilinos@14.2.0 cxxstd=17 ~adios2~boost~chaco~complex~debug~dtk~exodus~gtest~float~hdf5~hypre~intrepid2~isorropia~mesquite~minitensor~muelu~mumps~nox~openmp~phalanx~piro~python~rol~rythmos~shylu~stk~suite-sparse~superlu-dist~teko~tempus~x11~zoltan~zoltan2+intrepid+ml+stratimikos+thyra ^openmpi@5.0.5 %gcc@=13.3.0
  - nlohmann-json
  - pugixml
  - superlu
  - googletest
  - flibcpp
  - gnds
  - watch
  - htop
  - m4@1.4.19
  - autoconf@2.71 ^m4@1.4.19
  - automake@1.16.5
  - libtool@2.4.7

  view: true
  concretizer:
    unify: when_possible
  packages:
    gcc:
      externals:
      - spec: gcc@13.3.0 languages:='c,c++,fortran'
        prefix: /apps/spack/opt/gcc-10.5.0/gcc-13.3.0-bync7hfgvh4h45siluvgsj64rgb5jtth
        extra_attributes:
          compilers:
            c: /apps/spack/opt/gcc-10.5.0/gcc-13.3.0-bync7hfgvh4h45siluvgsj64rgb5jtth/bin/gcc
            cxx: /apps/spack/opt/gcc-10.5.0/gcc-13.3.0-bync7hfgvh4h45siluvgsj64rgb5jtth/bin/g++
            fortran: /apps/spack/opt/gcc-10.5.0/gcc-13.3.0-bync7hfgvh4h45siluvgsj64rgb5jtth/bin/gfortran
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@5.0.5 %gcc@13.3.0
        prefix: /apps/spack/opt/gcc-13.3.0/openmpi-5.0.5-lx62ho6eb5mp7xneq4lt3vmzf6xt7y6d
    python:
      buildable: false
      externals:
      - spec: python@3.11.15
        prefix: /projects/veracity/codes/conda_envs/SCALE-7.0.pre-b11
  compilers:
  - compiler:
      spec: gcc@13.3.0
      paths:
        cc: /apps/spack/opt/gcc-10.5.0/gcc-13.3.0-bync7hfgvh4h45siluvgsj64rgb5jtth/bin/gcc
        cxx: /apps/spack/opt/gcc-10.5.0/gcc-13.3.0-bync7hfgvh4h45siluvgsj64rgb5jtth/bin/g++
        fc: /apps/spack/opt/gcc-10.5.0/gcc-13.3.0-bync7hfgvh4h45siluvgsj64rgb5jtth/bin/gfortran
        f77: /apps/spack/opt/gcc-10.5.0/gcc-13.3.0-bync7hfgvh4h45siluvgsj64rgb5jtth/bin/gfortran
      operating_system: rhel8
      target: x86_64
      modules: []
      environment: {}
      extra_rpaths: []
  config:
    build_jobs: 12
    install_tree:
      root: /projects/veracity/codes/spack/SCALE-7.0.pre-b11-windriver-20260610/spack_opt
