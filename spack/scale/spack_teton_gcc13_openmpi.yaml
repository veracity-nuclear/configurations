# WARNING: OpenMPI on Teton is not the recommended configuration. Please consider using `spack_teton_gcc13_mpich.yaml` instead.

spack:
  specs:
  - cmake@3.23
  - netlib-lapack@3.11.0 %gcc@=13.4.0
  - boost@1.74.0 %gcc@13.4.0
  - swig@4.0.2 %gcc@13.4.0
  - hdf5@1.12.2 +cxx+fortran+hl ^openmpi@5.0.9 %gcc@=13.4.0
  - petsc@3.15.5 +metis+superlu-dist+hypre ^openmpi@5.0.9 %gcc@=13.4.0
  - silo@4.11.1 +hdf5 ^hdf5@1.12.2 +cxx+fortran+hl ^openmpi@5.0.9 %gcc@=13.4.0
  - trilinos@14.2.0 cxxstd=17 ~adios2~boost~chaco~complex~debug~dtk~exodus~gtest~float~hdf5~hypre~intrepid2~isorropia~mesquite~minitensor~muelu~mumps~nox~openmp~phalanx~piro~python~rol~rythmos~shylu~stk~suite-sparse~superlu-dist~teko~tempus~x11~zoltan~zoltan2+intrepid+ml+stratimikos+thyra ^openmpi@5.0.9 %gcc@=13.4.0
  - nlohmann-json
  - pugixml
  - superlu
  - googletest
  - flibcpp
  - gnds
  - watch
  - htop
  - m4@1.4.19
  - autoconf@2.71 ^m4@1.4.19
  - automake@1.16.5
  - libtool@2.4.7

  view: true
  concretizer:
    unify: when_possible
  packages:
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@5.0.9 %gcc@13.4.0
        prefix: /apps/spack/opt/gcc-13.4.0/openmpi-5.0.9-3nksphs6tyun5b7lh3lx2x36dsgvqsra
    python:
      buildable: false
      externals:
      - spec: python@3.11.15
        prefix: /projects/veracity/codes/conda_envs/SCALE-7.0.pre-b11
  compilers:
  - compiler:
      spec: gcc@13.4.0
      paths:
        cc: /apps/spack/opt/gcc-11.5.0/gcc-13.4.0-5dyuqxsmafc7dhogrdbdiqqifmhupqwr/bin/gcc
        cxx: /apps/spack/opt/gcc-11.5.0/gcc-13.4.0-5dyuqxsmafc7dhogrdbdiqqifmhupqwr/bin/g++
        fc: /apps/spack/opt/gcc-11.5.0/gcc-13.4.0-5dyuqxsmafc7dhogrdbdiqqifmhupqwr/bin/gfortran
        f77: /apps/spack/opt/gcc-11.5.0/gcc-13.4.0-5dyuqxsmafc7dhogrdbdiqqifmhupqwr/bin/gfortran
      operating_system: rhel8
      target: x86_64
      modules: []
      environment: {}
      extra_rpaths: []
  config:
    build_jobs: 12
