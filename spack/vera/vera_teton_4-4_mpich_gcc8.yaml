# Assumes you did `module load gcc/8.5.0 mpich/4.3.2` first
#
spack:
  # add package specs to the `specs` list
  specs:
    #  - mpich@4.3.2~hydra+libxml2+romio+slurm~verbs+wrapperrpath device=ch4 netmod=ofi pmi=pmix %gcc@=8.5.0
  - netlib-lapack %gcc@=8.5.0
  - boost %gcc@8.5.0
  - swig@4.0.2 %gcc@8.5.0
  - petsc@3.15 +metis+mpi+hypre+superlu-dist~kokkos cflags="-O3" cxxflags="-O3" fflags="-O3" %gcc@=8.5.0
  - silo@4.11.1 +hdf5 +mpi ~python %gcc@=8.5.0 ^hdf5@1.14.6 #cppflags="-I/apps/spack/opt/gcc-13.4.0/mpich-4.3.2-iljvvffn6j2dhl6czhlz44sf2tmnuywj/include" ldflags="-L/apps/spack/opt/gcc-13.4.0/mpich-4.3.2-iljvvffn6j2dhl6czhlz44sf2tmnuywj/lib"
